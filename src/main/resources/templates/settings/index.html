<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站设置 - 我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            overflow: hidden;
            backdrop-filter: blur(10px);
            animation: slideIn 0.6s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5em;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        nav {
            display: flex;
            flex-wrap: wrap;
            background: linear-gradient(to right, rgba(248,249,250,0.95), rgba(233,236,239,0.95));
            padding: 20px 40px;
            gap: 15px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.1);
        }
        
        nav a {
            color: #667eea;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            background: rgba(102, 126, 234, 0.05);
        }
        
        nav a:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .content {
            padding: 50px 40px;
        }
        
        .settings-section {
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            border-radius: 20px;
            border: 2px solid rgba(102, 126, 234, 0.1);
        }
        
        .settings-section h2 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 20px;
            position: relative;
        }
        
        .settings-section h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin-top: 8px;
            border-radius: 2px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 1.1em;
        }
        
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        input[type="color"] {
            width: 80px;
            height: 50px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: transparent;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        input[type="color"]:hover {
            transform: scale(1.1);
        }
        
        .color-preview {
            flex: 1;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            font-weight: 600;
            color: #666;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .file-label {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 35px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .file-label:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 35px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            font-size: 1.05em;
        }
        
        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #dc3545, #c82333);
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }
        
        .btn-danger:hover {
            box-shadow: 0 10px 30px rgba(220, 53, 69, 0.6);
        }
        
        .alert {
            padding: 18px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: 500;
            animation: slideDown 0.4s ease-out;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .alert-success {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        
        .alert-error {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        
        .preview-box {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
        }
        
        .preview-box p {
            color: #666;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .current-background {
            width: 100%;
            height: 150px;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            border: 2px solid #e0e0e0;
            margin-top: 10px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 网站设置</h1>
            <p style="opacity: 0.9; margin-top: 10px;">自定义你的专属风格</p>
        </header>
        
        <nav>
            <a href="/">首页</a>
            <a href="/diaries">日记列表</a>
            <a href="/diaries/new">写日记</a>
            <a href="/files">资料管理</a>
            <a href="/files/upload">上传资料</a>
        </nav>
        
        <div class="content">
            <div class="alert alert-success" th:if="${success}" th:text="${success}">
                操作成功！
            </div>
            
            <div class="alert alert-error" th:if="${error}" th:text="${error}">
                操作失败！
            </div>
            
            <div class="settings-section">
                <h2>🌈 选择主题颜色</h2>
                <form th:action="@{/settings/color}" method="post">
                    <div class="form-group">
                        <label>背景主颜色</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="colorPicker" name="color" 
                                   th:value="${backgroundColor}" onchange="updateColorPreview()"/>
                            <div class="color-preview">
                                当前颜色：<span id="colorValue" th:text="${backgroundColor}">#667eea</span>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn">保存颜色</button>
                </form>
            </div>
            
            <div class="settings-section">
                <h2>🖼️ 上传背景图片</h2>
                <form th:action="@{/settings/background}" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>选择图片</label>
                        <label for="backgroundUpload" class="file-label">
                            📁 选择图片文件
                        </label>
                        <input type="file" id="backgroundUpload" name="background" 
                               accept="image/*" onchange="showFileName()"/>
                        <div id="fileName" style="margin-top: 10px; color: #666;"></div>
                    </div>
                    <button type="submit" class="btn">上传图片</button>
                </form>
                
                <div class="preview-box" th:if="${backgroundImage != '' and backgroundImage != null}">
                    <p>当前背景图片：</p>
                    <div class="current-background" th:style="'background-image: url(' + ${backgroundImage} + ')'"></div>
                </div>
            </div>
            
            <div class="settings-section">
                <h2>⚙️ 重置设置</h2>
                <p style="color: #666; margin-bottom: 20px;">恢复默认的紫色渐变背景</p>
                <form th:action="@{/settings/reset}" method="post">
                    <button type="submit" class="btn btn-danger" onclick="return confirm('确定要恢复默认设置吗？')">
                        🔄 恢复默认设置
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        function updateColorPreview() {
            const color = document.getElementById('colorPicker').value;
            document.getElementById('colorValue').textContent = color;
        }
        
        function showFileName() {
            const fileInput = document.getElementById('backgroundUpload');
            const fileNameDisplay = document.getElementById('fileName');
            if (fileInput.files.length > 0) {
                fileNameDisplay.textContent = '已选择：' + fileInput.files[0].name;
            } else {
                fileNameDisplay.textContent = '';
            }
        }
    </script>
</body>
</html>
