<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 我的个人网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --primary: [[${themePrimaryColor}]];
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, [[${themePrimaryColor}]] 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, [[${themePrimaryColor}]] 0%, transparent 50%),
                linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: -2;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }
        
        body.has-bg-image::before {
            background: url([[${themeBackgroundImage}]]) no-repeat center center fixed !important;
            background-size: cover;
        }
        
        a { text-decoration: none; color: inherit; }
        
        nav {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        nav ul {
            display: flex;
            list-style: none;
            justify-content: space-around;
            width: 100%;
            max-width: 900px;
            padding: 0 20px;
        }
        
        nav a {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s;
        }
        
        nav a:hover {
            color: var(--text);
            background: var(--glass-bg);
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 100px 20px 50px;
        }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 45px;
            margin-bottom: 30px;
        }
        
        .page-title {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 35px;
            background: linear-gradient(135deg, #fff 0%, #a8c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .diary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }
        
        .diary-card {
            display: block;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 28px;
            transition: all 0.4s ease;
            color: inherit;
            text-decoration: none;
        }
        
        .diary-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--glass-shadow);
        }
        
        .diary-card h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .diary-card p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .diary-card .meta {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .diary-card .favorite-badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 15px;
        }
        
        .empty-state p {
            margin-bottom: 25px;
        }
        
        nav {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }
        
        .nav-logo { font-size: 22px; margin-right: 15px; flex-shrink: 0; }
        
        nav a {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 20px;
            transition: all 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        nav a:hover {
            color: var(--text);
            background: var(--glass-bg);
        }
        
        .nav-dropdown {
            position: relative;
            display: inline-block;
            flex-shrink: 0;
        }
        
        .nav-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            min-width: 120px;
            padding: 8px 0;
            z-index: 1001;
            white-space: nowrap;
        }
        
        .nav-dropdown:hover .nav-dropdown-content {
            display: block;
        }
        
        .nav-dropdown-content a {
            display: block;
            padding: 10px 16px;
            border-radius: 0;
        }
        
        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        @media (max-width: 768px) {
            .page-title { font-size: 28px; }
            .glass-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="/" class="nav-logo">🌸</a>
            <a href="/diaries">随笔</a>
            <div class="nav-dropdown">
                <a href="#">更多 ▾</a>
                <div class="nav-dropdown-content">
                    <a href="/diaries/new">✏️ 写随笔</a>
                    <a href="/tags">🏷️ 标签</a>
                    <a href="/favorites">⭐ 收藏</a>
                    <a href="/chat">🤖 AI聊天</a>
                    <a href="/words">📚 四级单词</a>
                    <a href="/files">📁 资料</a>
                </div>
            </div>
        </div>
        <div class="nav-right">
            <a href="/settings">⚙️ 设置</a>
            <a href="/logout" style="color: #ff6b6b;">退出</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="glass-card">
            <h1 class="page-title">⭐ 我的收藏</h1>
            
            <div class="diary-grid" th:if="${not #lists.isEmpty(diaries)}">
                <a th:href="@{/diaries/{id}(id=${diary.id})}" class="diary-card" th:each="diary : ${diaries}">
                    <span class="favorite-badge">⭐ 已收藏</span>
                    <h3 th:text="${diary.title}">随笔标题</h3>
                    <p th:text="${diary.content}">随笔内容</p>
                    <span class="meta" th:text="${#temporals.format(diary.createTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                </a>
            </div>
            
            <div class="empty-state" th:if="${#lists.isEmpty(diaries)}">
                <h2>还没有收藏</h2>
                <p>收藏你喜欢的随笔吧</p>
                <a href="/diaries" class="btn btn-primary" style="display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%); color: white; border-radius: 50px; text-decoration: none;">查看随笔</a>
            </div>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2026 我的个人网站</p>
    </footer>
    
    <script>
        var bgImage = '[[${themeBackgroundImage}]]';
        if (bgImage && bgImage.trim() !== '' && bgImage !== 'null') {
            document.body.classList.add('has-bg-image');
        }
    </script>
</body>
</html>
