<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资料管理 - 我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            overflow: hidden;
            backdrop-filter: blur(10px);
            animation: slideIn 0.6s ease-out;
            position: relative;
            z-index: 1;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        
        header h1 {
            font-size: 2.5em;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
        
        header a {
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s;
            font-weight: 600;
        }
        
        header a:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        nav {
            display: flex;
            flex-wrap: wrap;
            background: linear-gradient(to right, rgba(248,249,250,0.95), rgba(233,236,239,0.95));
            padding: 20px 40px;
            gap: 15px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        nav a {
            color: #667eea;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            background: rgba(102, 126, 234, 0.05);
        }
        
        nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        nav a:hover::before {
            left: 100%;
        }
        
        nav a:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .content {
            padding: 50px 40px;
        }
        
        .action-bar {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .action-bar h2 {
            color: #667eea;
            font-size: 2em;
            position: relative;
        }
        
        .action-bar h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin-top: 8px;
            border-radius: 2px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            font-size: 1.05em;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        
        .alert {
            padding: 18px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            animation: slideDown 0.4s ease-out;
            font-weight: 500;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .alert-success {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
            border: 2px solid #c3e6cb;
            box-shadow: 0 4px 15px rgba(21, 87, 36, 0.1);
        }
        
        .alert-error {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border: 2px solid #f5c6cb;
            box-shadow: 0 4px 15px rgba(114, 28, 36, 0.1);
        }
        
        .file-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        
        .file-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            border-left: 5px solid #667eea;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        
        .file-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 0;
            background: linear-gradient(to bottom, #667eea, #764ba2);
            transition: height 0.4s;
        }
        
        .file-card:hover::before {
            height: 100%;
        }
        
        .file-card:hover {
            background: linear-gradient(to right, rgba(102, 126, 234, 0.05), transparent);
            transform: translateY(-8px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.25);
        }
        
        .file-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
            transition: color 0.3s;
            font-weight: 700;
            word-break: break-all;
        }
        
        .file-card:hover h3 {
            color: #764ba2;
        }
        
        .file-info {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 20px;
        }
        
        .file-info p {
            margin-bottom: 8px;
            line-height: 1.6;
        }
        
        .file-actions {
            display: flex;
            gap: 12px;
        }
        
        .file-actions a,
        .file-actions form {
            flex: 1;
        }
        
        .file-actions a {
            text-align: center;
        }
        
        .btn-sm {
            padding: 10px 20px;
            font-size: 0.95em;
            width: 100%;
        }
        
        .btn-download {
            background: linear-gradient(135deg, #28a745, #218838);
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }
        
        .btn-download:hover {
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.5);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #dc3545, #c82333);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }
        
        .btn-danger:hover {
            box-shadow: 0 8px 25px rgba(220, 53, 69, 0.5);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            border-radius: 20px;
        }
        
        .empty-state h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2em;
        }
        
        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 25px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📁 资料管理</h1>
            <a href="/" style="color: white; text-decoration: none;">返回首页</a>
        </header>
        
        <nav>
            <a href="/">首页</a>
            <a href="/diaries">日记列表</a>
            <a href="/diaries/new">写日记</a>
            <a href="/files">资料管理</a>
            <a href="/files/upload">上传资料</a>
        </nav>
        
        <div class="content">
            <div class="action-bar">
                <h2>所有资料</h2>
                <a href="/files/upload" class="btn">⬆️ 上传文件</a>
            </div>
            
            <div class="alert alert-success" th:if="${success}" th:text="${success}">
                操作成功！
            </div>
            
            <div class="alert alert-error" th:if="${error}" th:text="${error}">
                操作失败！
            </div>
            
            <div class="file-list" th:if="${not #lists.isEmpty(files)}">
                <div class="file-card" th:each="file : ${files}">
                    <h3 th:text="${file.originalName}">文件名</h3>
                    <div class="file-info">
                        <p th:text="${'类型：' + file.fileType}">类型</p>
                        <p th:text="${'大小：' + #strings.size(file.fileSize) / 1024 + ' KB'}">大小</p>
                        <p th:text="${'上传时间：' + #temporals.format(file.uploadTime, 'yyyy-MM-dd HH:mm:ss')}">上传时间</p>
                        <p th:if="${file.description}" th:text="${'说明：' + file.description}">说明</p>
                    </div>
                    <div class="file-actions">
                        <a th:href="@{/files/{id}(id=${file.id})}" class="btn btn-sm btn-download">下载</a>
                        <form th:action="@{/files/{id}/delete(id=${file.id})}" method="post" 
                              onsubmit="return confirm('确定要删除这个文件吗？')" style="display: inline;">
                            <button type="submit" class="btn btn-sm btn-danger">删除</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="empty-state" th:if="${#lists.isEmpty(files)}">
                <h2>还没有上传任何资料</h2>
                <p>快来上传你的第一个文件吧！</p>
                <a href="/files/upload" class="btn">上传文件</a>
            </div>
        </div>
    </div>
</body>
</html>
