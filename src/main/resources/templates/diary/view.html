<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${diary.title}">查看日记 - 我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            overflow: hidden;
            backdrop-filter: blur(10px);
            animation: slideIn 0.6s ease-out;
            position: relative;
            z-index: 1;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            position: relative;
        }
        
        header h1 {
            font-size: 2.5em;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
        
        nav {
            display: flex;
            flex-wrap: wrap;
            background: linear-gradient(to right, rgba(248,249,250,0.95), rgba(233,236,239,0.95));
            padding: 20px 40px;
            gap: 15px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        nav a {
            color: #667eea;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            background: rgba(102, 126, 234, 0.05);
        }
        
        nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        nav a:hover::before {
            left: 100%;
        }
        
        nav a:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .content {
            padding: 50px 40px;
        }
        
        .diary-header {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 40px;
            border-bottom: 3px solid rgba(102, 126, 234, 0.2);
        }
        
        .diary-header h1 {
            color: #667eea;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
            font-weight: 700;
        }
        
        .diary-meta {
            color: #999;
            font-size: 1.05em;
            display: inline-block;
            padding: 10px 25px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 20px;
        }
        
        .diary-content {
            line-height: 2;
            color: #333;
            font-size: 1.15em;
            white-space: pre-wrap;
            background: linear-gradient(to bottom, rgba(248,249,250,0.5), white);
            padding: 40px;
            border-radius: 20px;
            min-height: 350px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        
        .action-bar {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 35px;
            border: none;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            font-size: 1.05em;
        }
        
        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d, #5a6268);
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 10px 30px rgba(108, 117, 125, 0.6);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #dc3545, #c82333);
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }
        
        .btn-danger:hover {
            box-shadow: 0 10px 30px rgba(220, 53, 69, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 日记详情</h1>
        </header>
        
        <nav>
            <a href="/">首页</a>
            <a href="/diaries">日记列表</a>
            <a href="/diaries/new">写日记</a>
            <a href="/files">资料管理</a>
            <a href="/files/upload">上传资料</a>
        </nav>
        
        <div class="content">
            <div class="diary-header">
                <h1 th:text="${diary.title}">日记标题</h1>
                <div class="diary-meta">
                    <span th:text="${'创建于：' + #temporals.format(diary.createTime, 'yyyy-MM-dd HH:mm:ss')}">创建时间</span>
                    <span th:if="${diary.updateTime != diary.createTime}" 
                          th:text="${' | 更新于：' + #temporals.format(diary.updateTime, 'yyyy-MM-dd HH:mm:ss')}">更新时间</span>
                </div>
            </div>
            
            <div class="diary-content" th:text="${diary.content}">
                日记内容
            </div>
            
            <div class="action-bar">
                <a th:href="@{/diaries/{id}/edit(id=${diary.id})}" class="btn">✏️ 编辑</a>
                <form th:action="@{/diaries/{id}/delete(id=${diary.id})}" method="post" 
                      onsubmit="return confirm('确定要删除这篇日记吗？')" style="display: inline;">
                    <button type="submit" class="btn btn-danger">🗑️ 删除</button>
                </form>
                <a href="/diaries" class="btn btn-secondary">返回列表</a>
            </div>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 我的个人网站 · 用心记录每一天 · <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" style="color: var(--text-secondary); text-decoration: underline;">晋ICP备2026003258号-1</a></p>
    </footer>
</body>
</html>
