<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建标签 - 我的个人网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --primary: [[${themePrimaryColor}]];
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, [[${themePrimaryColor}]] 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, [[${themePrimaryColor}]] 0%, transparent 50%),
                linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: -2;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: -1;
        }
        
        body.has-bg-image::before {
            background: url([[${themeBackgroundImage}]]) no-repeat center center fixed !important;
            background-size: cover;
        }
        
        a { text-decoration: none; color: inherit; }
        
        nav {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        nav ul {
            display: flex;
            list-style: none;
            justify-content: space-around;
            width: 100%;
            max-width: 900px;
            padding: 0 20px;
        }
        
        nav a {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s;
        }
        
        nav a:hover {
            color: var(--text);
            background: var(--glass-bg);
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 100px 20px 50px;
        }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 45px;
        }
        
        .page-title {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 35px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            font-size: 16px;
            color: var(--text);
            font-family: inherit;
            transition: all 0.3s;
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2);
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid var(--glass-border);
        }
        
        .color-picker {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .color-option:hover,
        .color-option.selected {
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }
        
        nav {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }
        
        .nav-logo { font-size: 22px; margin-right: 15px; flex-shrink: 0; }
        
        nav a {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 20px;
            transition: all 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        nav a:hover {
            color: var(--text);
            background: var(--glass-bg);
        }
        
        .nav-dropdown {
            position: relative;
            display: inline-block;
            flex-shrink: 0;
        }
        
        .nav-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            min-width: 120px;
            padding: 8px 0;
            z-index: 1001;
            white-space: nowrap;
        }
        
        .nav-dropdown:hover .nav-dropdown-content {
            display: block;
        }
        
        .nav-dropdown-content a {
            display: block;
            padding: 10px 16px;
            border-radius: 0;
        }
        
        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        @media (max-width: 768px) {
            .page-title { font-size: 28px; }
            .glass-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="/" class="nav-logo">🌸</a>
            <a href="/diaries">随笔</a>
            <div class="nav-dropdown">
                <a href="#">更多 ▾</a>
                <div class="nav-dropdown-content">
                    <a href="/diaries/new">✏️ 写随笔</a>
                    <a href="/tags">🏷️ 标签</a>
                    <a href="/favorites">⭐ 收藏</a>
                    <a href="/chat">🤖 AI聊天</a>
                    <a href="/words">📚 四级单词</a>
                    <a href="/files">📁 资料</a>
                </div>
            </div>
        </div>
        <div class="nav-right">
            <a href="/settings">⚙️ 设置</a>
            <a href="/logout" style="color: #ff6b6b;">退出</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="glass-card">
            <h1 class="page-title">🏷️ 新建标签</h1>
            
            <form th:action="@{/tags}" method="post" th:object="${tag}">
                <div class="form-group">
                    <label for="name">标签名称</label>
                    <input type="text" id="name" name="name" required placeholder="输入标签名称"/>
                </div>
                
                <div class="form-group">
                    <label for="description">描述（可选）</label>
                    <textarea id="description" name="description" placeholder="标签的简短描述"></textarea>
                </div>
                
                <div class="form-group">
                    <label>标签颜色</label>
                    <input type="color" id="color" name="color" value="#667eea" 
                           style="width: 60px; height: 60px; cursor: pointer; border-radius: 10px;"/>
                </div>
                
                <div class="actions">
                    <button type="submit" class="btn btn-primary">创建标签</button>
                    <a href="/tags" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2026 我的个人网站</p>
    </footer>
    
    <script>
        var bgImage = '[[${themeBackgroundImage}]]';
        if (bgImage && bgImage.trim() !== '' && bgImage !== 'null') {
            document.body.classList.add('has-bg-image');
        }
    </script>
</body>
</html>
