<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 - 我的个人网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --primary: [[${themePrimaryColor}]];
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, [[${themePrimaryColor}]] 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, [[${themePrimaryColor}]] 0%, transparent 50%),
                linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: -2;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }
        
        body.has-bg-image::before {
            background: url([[${themeBackgroundImage}]]) no-repeat center center fixed !important;
            background-size: cover;
        }
        
        a { text-decoration: none; color: inherit; }
        
        nav {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        nav ul {
            display: flex;
            list-style: none;
            justify-content: space-around;
            width: 100%;
            max-width: 900px;
            padding: 0 20px;
        }
        
        nav a {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s;
        }
        
        nav a:hover {
            color: var(--text);
            background: var(--glass-bg);
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px 50px;
        }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 45px;
            margin-bottom: 30px;
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
        }
        
        .profile-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .profile-email {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        
        .info-section {
            margin-top: 30px;
        }
        
        .info-section h3 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .info-label {
            color: var(--text-secondary);
        }
        
        .info-value {
            font-weight: 500;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        nav {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }
        
        .nav-logo { font-size: 22px; margin-right: 15px; flex-shrink: 0; }
        
        nav a {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 20px;
            transition: all 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        nav a:hover {
            color: var(--text);
            background: var(--glass-bg);
        }
        
        .nav-dropdown {
            position: relative;
            display: inline-block;
            flex-shrink: 0;
        }
        
        .nav-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            min-width: 120px;
            padding: 8px 0;
            z-index: 1001;
            white-space: nowrap;
        }
        
        .nav-dropdown:hover .nav-dropdown-content {
            display: block;
        }
        
        .nav-dropdown-content a {
            display: block;
            padding: 10px 16px;
            border-radius: 0;
        }
        
        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        @media (max-width: 768px) {
            .glass-card { padding: 30px 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .avatar { width: 100px; height: 100px; font-size: 40px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="/" class="nav-logo">🌸</a>
            <a href="/diaries">随笔</a>
            <div class="nav-dropdown">
                <a href="#">更多 ▾</a>
                <div class="nav-dropdown-content">
                    <a href="/diaries/new">✏️ 写随笔</a>
                    <a href="/tags">🏷️ 标签</a>
                    <a href="/favorites">⭐ 收藏</a>
                    <a href="/chat">🤖 AI聊天</a>
                    <a href="/words">📚 四级单词</a>
                    <a href="/files">📁 资料</a>
                </div>
            </div>
        </div>
        <div class="nav-right">
            <a href="/settings">⚙️ 设置</a>
            <a href="/logout" style="color: #ff6b6b;">退出</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="glass-card">
            <div class="profile-header">
                <div class="avatar">👤</div>
                <h1 class="profile-name" th:text="${currentUser?.nickname ?: currentUser?.username}">用户名</h1>
                <p class="profile-email" th:text="${currentUser?.email}">email@example.com</p>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" th:text="${diaryCount}">0</div>
                    <div class="stat-label">随笔</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" th:text="${tagCount}">0</div>
                    <div class="stat-label">标签</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" th:text="${fileCount}">0</div>
                    <div class="stat-label">文件</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" th:text="${favoriteCount}">0</div>
                    <div class="stat-label">收藏</div>
                </div>
            </div>
            
            <div class="info-section">
                <h3>账号信息</h3>
                <div class="info-item">
                    <span class="info-label">用户名</span>
                    <span class="info-value" th:text="${currentUser?.username}">username</span>
                </div>
                <div class="info-item">
                    <span class="info-label">邮箱</span>
                    <span class="info-value" th:text="${currentUser?.email}">email@example.com</span>
                </div>
                <div class="info-item">
                    <span class="info-label">昵称</span>
                    <span class="info-value" th:text="${currentUser?.nickname ?: '未设置'}">未设置</span>
                </div>
                <div class="info-item">
                    <span class="info-label">注册时间</span>
                    <span class="info-value" th:text="${#temporals.format(currentUser?.createTime, 'yyyy-MM-dd')}">2026-01-01</span>
                </div>
                <div class="info-item">
                    <span class="info-label">上次登录</span>
                    <span class="info-value" th:text="${currentUser?.lastLoginTime ? #temporals.format(currentUser.lastLoginTime, 'yyyy-MM-dd HH:mm') : '首次登录'}">2026-01-01</span>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="/settings" class="btn btn-primary">修改资料</a>
            </div>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2026 我的个人网站</p>
    </footer>
    
    <script>
        var bgImage = '[[${themeBackgroundImage}]]';
        if (bgImage && bgImage.trim() !== '' && bgImage !== 'null') {
            document.body.classList.add('has-bg-image');
        }
    </script>
</body>
</html>
