<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style th:inline="css">
        :root {
            --primary-color: [[${themePrimaryColor}]];
            --secondary-color: #764ba2;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body.has-bg-image {
            background: url([[${themeBackgroundImage}]]) no-repeat center center fixed;
            background-size: cover;
        }
        
        body.has-bg-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.85) 0%, rgba(118, 75, 162, 0.85) 100%);
            z-index: 0;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            overflow: hidden;
            backdrop-filter: blur(10px);
            animation: slideIn 0.6s ease-out;
            position: relative;
            z-index: 1;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 60px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        header.has-bg-image {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%),
                        url([[${themeBackgroundImage}]]) no-repeat center center;
            background-size: cover;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            z-index: 1;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        header h1 {
            font-size: 3em;
            margin-bottom: 15px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }
        
        header p {
            font-size: 1.3em;
            opacity: 0.95;
            position: relative;
            z-index: 1;
            font-weight: 300;
        }
        
        nav {
            display: flex;
            flex-wrap: wrap;
            background: linear-gradient(to right, rgba(248,249,250,0.95), rgba(233,236,239,0.95));
            padding: 20px 40px;
            gap: 15px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        nav a {
            color: var(--primary-color);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            background: rgba(102, 126, 234, 0.05);
        }
        
        nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        nav a:hover::before {
            left: 100%;
        }
        
        nav a:hover {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .content {
            padding: 50px 40px;
        }
        
        .welcome-section {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            border-radius: 20px;
            margin-bottom: 40px;
        }
        
        .welcome-section h2 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
            font-weight: 700;
        }
        
        .welcome-section p {
            color: #555;
            font-size: 1.25em;
            line-height: 2;
            margin-bottom: 35px;
            font-weight: 300;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }
        
        .feature-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .feature-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .feature-card:hover::before {
            opacity: 1;
        }
        
        .feature-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.5);
        }
        
        .feature-card h3 {
            font-size: 1.8em;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }
        
        .feature-card p {
            opacity: 0.95;
            line-height: 1.8;
            position: relative;
            z-index: 1;
            font-size: 1.05em;
        }
        
        .recent-diaries {
            margin-top: 60px;
        }
        
        .recent-diaries h2 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.2em;
            position: relative;
        }
        
        .recent-diaries h2::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 15px auto 0;
            border-radius: 2px;
        }
        
        .diary-item {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 15px;
            border-left: 5px solid #667eea;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        
        .diary-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 0;
            background: linear-gradient(to bottom, #667eea, #764ba2);
            transition: height 0.3s;
        }
        
        .diary-item:hover::before {
            height: 100%;
        }
        
        .diary-item:hover {
            background: linear-gradient(to right, rgba(102, 126, 234, 0.05), transparent);
            transform: translateX(10px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }
        
        .diary-item h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 1.5em;
            transition: color 0.3s;
        }
        
        .diary-item:hover h3 {
            color: #764ba2;
        }
        
        .diary-item p {
            color: #666;
            margin-bottom: 12px;
            line-height: 1.7;
        }
        
        .diary-item small {
            color: #999;
            font-size: 0.9em;
            display: inline-block;
            padding: 5px 12px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 15px;
        }
        
        footer {
            background: linear-gradient(to right, rgba(248,249,250,0.95), rgba(233,236,239,0.95));
            text-align: center;
            padding: 30px;
            color: #666;
            border-top: 2px solid rgba(102, 126, 234, 0.1);
            backdrop-filter: blur(10px);
        }
        
        footer p {
            font-size: 1em;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌟 我的个人空间</h1>
            <p>记录生活点滴 · 分享珍贵资料</p>
        </header>
        
        <nav>
            <a href="/">首页</a>
            <a href="/diaries">我的日记</a>
            <a href="/diaries/new">写日记</a>
            <a href="/files">资料管理</a>
            <a href="/files/upload">上传资料</a>
        </nav>
        
        <div class="content">
            <div class="welcome-section">
                <h2>欢迎来到我的个人网站！</h2>
                <p>
                    这是一个属于我自己的小天地，在这里我可以：<br>
                    ✍️ 记录生活的点点滴滴<br>
                    📁 管理和分享各种资料文件<br>
                    💫 珍藏每一个值得纪念的时刻
                </p>
                
                <div class="features">
                    <div class="feature-card">
                        <h3>📝 写日记</h3>
                        <p>记录每天的心情和故事，留下珍贵的回忆</p>
                    </div>
                    <div class="feature-card">
                        <h3>📎 传资料</h3>
                        <p>上传和管理各种文档、图片、视频等资料</p>
                    </div>
                    <div class="feature-card">
                        <h3>🔒 私密空间</h3>
                        <p>完全个人的空间，只属于你自己的记忆宝库</p>
                    </div>
                </div>
            </div>
            
            <div class="recent-diaries" th:if="${not #lists.isEmpty(diaries)}">
                <h2>最新日记</h2>
                <div class="diary-item" th:each="diary : ${diaries}" th:if="${diaryStat.index < 5}">
                    <h3 th:text="${diary.title}">日记标题</h3>
                    <p th:text="${#strings.abbreviate(diary.content, 200)}">日记内容</p>
                    <small th:text="${#temporals.format(diary.createTime, 'yyyy-MM-dd HH:mm:ss')}">时间</small>
                </div>
            </div>
        </div>
        
        <footer>
            <p>&copy; 2026 我的个人网站 · 用心记录每一天 · <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" style="color: var(--text-secondary); text-decoration: underline;">晋ICP备2026003258号-1</a></p>
        </footer>
    </div>
    
    <script th:inline="javascript">
        var bgImage = /*[[${themeBackgroundImage}]]*/ '';
        if (bgImage && bgImage.trim() !== '') {
            document.body.classList.add('has-bg-image');
            document.querySelector('header').classList.add('has-bg-image');
        }
    </script>
</body>
</html>
