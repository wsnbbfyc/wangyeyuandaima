<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传资料 - 我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            overflow: hidden;
            backdrop-filter: blur(10px);
            animation: slideIn 0.6s ease-out;
            position: relative;
            z-index: 1;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            position: relative;
        }
        
        header h1 {
            font-size: 2.5em;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
        
        nav {
            display: flex;
            flex-wrap: wrap;
            background: linear-gradient(to right, rgba(248,249,250,0.95), rgba(233,236,239,0.95));
            padding: 20px 40px;
            gap: 15px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        nav a {
            color: #667eea;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            background: rgba(102, 126, 234, 0.05);
        }
        
        nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        nav a:hover::before {
            left: 100%;
        }
        
        nav a:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .content {
            padding: 50px 40px;
        }
        
        .upload-area {
            border: 3px dashed rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            padding: 70px 40px;
            text-align: center;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            margin-bottom: 30px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .upload-area::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .upload-area:hover {
            border-color: rgba(102, 126, 234, 0.6);
            transform: scale(1.02);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.2);
        }
        
        .upload-area:hover::before {
            opacity: 1;
        }
        
        .upload-icon {
            font-size: 5em;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .upload-area h3 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
            font-weight: 700;
        }
        
        .upload-area p {
            color: #666;
            position: relative;
            z-index: 1;
            font-size: 1.1em;
        }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            z-index: 1;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .file-input-wrapper .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 45px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            font-size: 1.1em;
        }
        
        .file-input-wrapper .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }
        
        .selected-file {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: fadeIn 0.4s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .selected-file.show {
            display: block;
        }
        
        .selected-file p {
            color: #667eea;
            font-weight: 600;
            font-size: 1.05em;
        }
        
        .form-group {
            margin-bottom: 30px;
        }
        
        .form-group label {
            display: block;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 1.15em;
            position: relative;
        }
        
        .form-group label::after {
            content: '';
            display: block;
            width: 40px;
            height: 3px;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin-top: 6px;
            border-radius: 2px;
        }
        
        .form-group textarea {
            width: 100%;
            padding: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1.05em;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 120px;
            resize: vertical;
        }
        
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }
        
        .alert {
            padding: 18px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            animation: slideDown 0.4s ease-out;
            font-weight: 500;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .alert-error {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border: 2px solid #f5c6cb;
            box-shadow: 0 4px 15px rgba(114, 28, 36, 0.1);
        }
        
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 50px;
            border: none;
            border-radius: 15px;
            font-size: 1.15em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d, #5a6268);
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 10px 30px rgba(108, 117, 125, 0.6);
        }
        
        .btn-submit {
            width: 100%;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⬆️ 上传资料</h1>
        </header>
        
        <nav>
            <a href="/">首页</a>
            <a href="/diaries">日记列表</a>
            <a href="/diaries/new">写日记</a>
            <a href="/files">资料管理</a>
            <a href="/files/upload">上传资料</a>
        </nav>
        
        <div class="content">
            <div class="alert alert-error" th:if="${error}" th:text="${error}">
                错误信息
            </div>
            
            <form th:action="@{/files/upload}" method="post" enctype="multipart/form-data">
                <div class="upload-area">
                    <div class="upload-icon">📎</div>
                    <h3>选择文件上传</h3>
                    <p>支持各种文件格式，最大 50MB</p>
                    
                    <div class="file-input-wrapper">
                        <span class="btn">选择文件</span>
                        <input type="file" id="file" name="file" required onchange="showFileName()"/>
                    </div>
                    
                    <div class="selected-file" id="selectedFile">
                        <p id="fileName"></p>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="description">文件说明（可选）</label>
                    <textarea id="description" name="description" placeholder="简单描述一下这个文件吧..."></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-submit">开始上传</button>
                </div>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="/files" class="btn btn-secondary">返回资料列表</a>
            </div>
        </div>
    </div>
    
    <script>
        function showFileName() {
            const fileInput = document.getElementById('file');
            const selectedFileDiv = document.getElementById('selectedFile');
            const fileNameP = document.getElementById('fileName');
            
            if (fileInput.files.length > 0) {
                const fileName = fileInput.files[0].name;
                fileNameP.textContent = '已选择：' + fileName;
                selectedFileDiv.classList.add('show');
            } else {
                selectedFileDiv.classList.remove('show');
            }
        }
    </script>
</body>
</html>
