<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">页面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --primary: [[${themePrimaryColor != null ? themePrimaryColor : '#667eea'}]];
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, var(--primary) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, var(--primary) 0%, transparent 50%),
                linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: -2;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: -1;
        }
        
        body.has-bg-image::before {
            background: url([[${themeBackgroundImage}]]) no-repeat center center fixed !important;
            background-size: cover;
        }
        
        a { text-decoration: none; color: inherit; }
        
        nav {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-sizing: border-box;
        }
        
        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-logo {
            font-size: 24px;
            margin-right: 20px;
            text-decoration: none;
        }
        
        .nav-link {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            text-decoration: none;
            white-space: nowrap;
        }
        
        .nav-link:hover {
            color: var(--text);
            background: var(--glass-bg);
        }
        
        .nav-dropdown {
            position: relative;
            display: inline-block;
        }
        
        .nav-dropdown-btn {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            cursor: pointer;
            background: transparent;
            border: none;
            white-space: nowrap;
        }
        
        .nav-dropdown-btn:hover {
            color: var(--text);
            background: var(--glass-bg);
        }
        
        .nav-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(30, 30, 50, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            min-width: 140px;
            padding: 8px 0;
            z-index: 1001;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .nav-dropdown:hover .nav-dropdown-content {
            display: block;
        }
        
        .nav-dropdown-content a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            color: var(--text-secondary);
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .nav-dropdown-content a:hover {
            background: var(--glass-bg);
            color: var(--text);
        }
        
        @media (max-width: 768px) {
            nav { padding: 0 15px; }
            .nav-link { padding: 8px 10px; font-size: 12px; }
            .nav-dropdown-btn { padding: 8px 10px; font-size: 12px; }
            .nav-logo { margin-right: 10px; font-size: 20px; }
            .nav-dropdown-content { right: 0; left: auto; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="/" class="nav-logo">🌸</a>
            <a href="/diaries" class="nav-link">随笔</a>
            <div class="nav-dropdown">
                <span class="nav-dropdown-btn">更多 ▾</span>
                <div class="nav-dropdown-content">
                    <a href="/diaries/new">✏️ 写随笔</a>
                    <a href="/tags">🏷️ 标签</a>
                    <a href="/favorites">⭐ 收藏</a>
                    <a href="/chat">🤖 AI聊天</a>
                    <a href="/files">📁 资料</a>
                </div>
            </div>
        </div>
        <div class="nav-right">
            <a href="/settings" class="nav-link">⚙️ 设置</a>
            <a href="/logout" class="nav-link" style="color: #ff6b6b;">退出</a>
        </div>
    </nav>
</body>
</html>
